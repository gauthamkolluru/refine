<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diplomat Comments</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 13px;
      width: 300px;
      padding: 16px;
      margin: 0;
      color: #1f1f1f;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
    }
    label {
      display: block;
      margin-bottom: 10px;
    }
    label span {
      display: block;
      margin-bottom: 3px;
      font-weight: 600;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 5px 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    #save-btn {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #save-btn:hover { background: #1558b0; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #1f7a3e;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>Diplomat Comments</h2>

  <label>
    <span>Backend URL</span>
    <input type="text" id="backendUrl" placeholder="http://localhost:8787">
  </label>
  <label>
    <span>LLM Base URL</span>
    <input type="text" id="llmBaseUrl" placeholder="http://localhost:1234">
  </label>
  <label>
    <span>LLM Model</span>
    <input type="text" id="llmModel" placeholder="e.g. llama-3-8b-instruct">
  </label>
  <label>
    <span>LLM API Key</span>
    <input type="password" id="llmApiKey" placeholder="sk-... (leave blank for LM Studio)">
  </label>
  <label>
    <span>Toxicity Threshold (0–1)</span>
    <input type="number" id="toxicityThreshold" min="0" max="1" step="0.05" placeholder="0.7">
  </label>
  <label>
    <span>Max Comments</span>
    <input type="number" id="maxComments" min="1" max="200" step="1" placeholder="50">
  </label>

  <button id="save-btn">Save Settings</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
